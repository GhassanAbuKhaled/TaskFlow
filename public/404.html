<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fix: redirect 404s back to index.html
      // preserving the path in the query string
      var path = window.location.pathname;
      var repo = '/' + window.location.pathname.split('/')[1];
      sessionStorage.setItem('spa-redirect', path);
      window.location.replace(repo + '/?p=1');
    </script>
  </head>
  <body></body>
</html>
